name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7 --no-validate-url

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Lint + unit tests
        run: ./gradlew --no-daemon lint testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Build release APK (unsigned unless signing configured)
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: microblog-writer-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: microblog-writer-release-apk
          path: app/build/outputs/apk/release/*.apk
